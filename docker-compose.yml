services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: approvalflow
      POSTGRES_PASSWORD: approvalflow_local
      POSTGRES_DB: approvalflow_dev
    ports:
      - "5432:5432"
    volumes:
      - approvalflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U approvalflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  approvalflow_pgdata:
